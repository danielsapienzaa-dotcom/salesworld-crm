const computeKPI = (leads) => {
  const chiamate = leads.filter(l => l.stato !== "Da chiamare").length;
  const appuntamenti = leads.filter(l => ["Appuntamento fissato","Anteprima mostrata","Vendita chiusa"].includes(l.stato)).length;
  const anteprime = leads.filter(l => ["Anteprima mostrata","Vendita chiusa"].includes(l.stato)).length;
  const vendite = leads.filter(l => l.stato === "Vendita chiusa").length;
  const tasso_app = chiamate > 0 ? (appuntamenti/chiamate*100).toFixed(1) : "—";
  const tasso_chiusura = anteprime > 0 ? (vendite/anteprime*100).toFixed(1) : "—";
  // Fatturato: setup + (mensile * mesi)
  const fatturato = leads.filter(l => l.stato === "Vendita chiusa").reduce((acc, l) => {
    const setup = parseFloat(l.prezzoSetup)||0;
    const mensile = parseFloat(l.prezzoMensile)||0;
    const mesi = parseInt(l.mesiContratto)||0;
    return acc + setup + (mensile * mesi);
  }, 0);
  const chiuse2 = leads.filter(l => l.stato === "Vendita chiusa");
  const fatturatoSetup = chiuse2.reduce((acc,l) => acc+(parseFloat(l.prezzoSetup)||0), 0);
  const ricorrenteMensile = chiuse2.reduce((acc,l) => acc+(parseFloat(l.prezzoMensile)||0), 0);
  const commSetup = fatturatoSetup * COMM_PCT;
  const commMensile = ricorrenteMensile * COMM_PCT;
  const commissioni = commSetup + commMensile;
  return { chiamate, appuntamenti, anteprime, vendite, tasso_app, tasso_chiusura, fatturato, fatturatoSetup, ricorrenteMensile, commSetup, commMensile, commissioni };
};

// ─── LOGIN ───────────────────────────────────────────
function Login({ users, onLogin }) {
  const [sel, setSel] = useState(users[0].id);
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const handle = () => {
    const u = users.find(x => x.id===sel);
    if (u && u.password===pw) onLogin(u);
    else { setErr("Password errata"); setTimeout(()=>setErr(""),2000); }
  };
  return (
    <div style={{ minHeight:"100vh", background:"#080c14", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ width:"100%", maxWidth:340 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>
          <div style={{ fontSize:40, marginBottom:8 }}>⚡</div>
          <div style={{ fontSize:28, fontWeight:900, color:"#fff", letterSpacing:"-1px" }}>Sales<span style={{ color:"#3b82f6" }}>World</span></div>
          <div style={{ color:"#475569", fontSize:13, marginTop:4 }}>CRM & Script — Pavia</div>
        </div>
        <div style={{ ...S.card, padding:24 }}>
          <div style={{ marginBottom:14 }}>
            <label style={S.label}>Profilo</label>
            <select style={S.select} value={sel} onChange={e=>setSel(e.target.value)}>
              {users.map(u=><option key={u.id} value={u.id}>{u.name}{u.role==="manager"?" 👑":""}</option>)}
            </select>
          </div>
          <div style={{ marginBottom:18 }}>
            <label style={S.label}>Password</label>
            <input style={S.input} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="••••••••"/>
          </div>
          {err && <div style={{ color:"#fca5a5", fontSize:13, marginBottom:10, textAlign:"center" }}>{err}</div>}
          <button style={{ ...S.btn, ...S.btnP, width:"100%", padding:"11px 0", fontSize:14 }} onClick={handle}>Accedi →</button>
        </div>
        <div style={{ textAlign:"center", color:"#1e3a5f", fontSize:11, marginTop:10 }}>Manager: manager123 · v1pass / v2pass / v3pass / v4pass</div>
      </div>
    </div>
  );
}

function SellerView({ user, leads, addLead, updateLead, deleteLead }) {
  const [tab, setTab] = useState("leads");
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState("tutti");
  const [search, setSearch] = useState("");
  const [openScript, setOpenScript] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  const mine = leads.filter(l => l.userId===user.id);
  const kpi = computeKPI(mine);

  // Appuntamenti futuri ordinati
  const appuntamenti = mine.filter(l =>
    (l.stato==="Appuntamento fissato"||l.stato==="Anteprima mostrata") && l.dataAppuntamento
  ).sort((a,b)=>new Date(a.dataAppuntamento)-new Date(b.dataAppuntamento));

  const followups = mine.filter(l => { const d=daysUntil(l.followup); return d!==null && d<=1; });

  const filtered = mine.filter(l => {
    const mf = filter==="tutti"||l.stato===filter;
    const ms = !search||l.nome.toLowerCase().includes(search.toLowerCase())||(l.telefono||"").includes(search);
    return mf && ms;
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));

  const saveLead = (form) => {
    if (editing) {
      updateLead({ ...editing, ...form });
      setEditing(null);
    } else {
      const newLead = { ...form, id: Date.now().toString(), userId: user.id, createdAt: new Date().toISOString() };
      addLead(newLead);
      setShowForm(false);
    }
  };

  return (
    <div style={S.page}>
      <div style={{ ...S.flexB, marginBottom:18, flexWrap:"wrap", gap:8 }}>
        <div>
          <div style={S.h1}>Ciao, {user.name} 👋</div>
          <div style={{ color:"#475569", fontSize:12 }}>{new Date().toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          {["leads","agenda","kpi","script"].map(t=><TabBtn key={t} label={t==="leads"?"📋 Lead":t==="agenda"?"📅 Agenda":t==="kpi"?"📊 KPI":"📖 Script"} active={tab===t} onClick={()=>setTab(t)}/>)}
        </div>
      </div>

      {/* Alert follow-up */}
      {followups.length>0 && (
        <div style={{ background:"#1c1205", border:"1px solid #92400e", borderRadius:10, padding:"9px 14px", marginBottom:12, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          <span>🔔</span><span style={{ color:"#fdba74", fontWeight:700, fontSize:13 }}>Follow-up oggi:</span>
          {followups.map(l=><span key={l.id} style={{ ...S.tag, background:"#422006", color:"#fdba74", cursor:"pointer" }} onClick={()=>{setEditing(l);setTab("leads");}}>{l.nome}</span>)}
        </div>
      )}

      {/* ── LEADS ── */}
      {confirmDelete && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:"#0d1520", border:"1px solid #7f1d1d", borderRadius:14, padding:24, maxWidth:300, width:"100%" }}>
            <div style={{ fontSize:28, marginBottom:10, textAlign:"center" }}>🗑️</div>
            <div style={{ fontWeight:700, color:"#fff", fontSize:15, marginBottom:6, textAlign:"center" }}>Eliminare questo lead?</div>
            <div style={{ color:"#64748b", fontSize:13, marginBottom:20, textAlign:"center" }}>L'operazione non è reversibile.</div>
            <div style={{ display:"flex", gap:10 }}>
              <button style={{ ...S.btn, ...S.btnD, flex:1 }} onClick={()=>{ deleteLead(confirmDelete); setConfirmDelete(null); }}>Elimina</button>
              <button style={{ ...S.btn, ...S.btnG, flex:1 }} onClick={()=>setConfirmDelete(null)}>Annulla</button>
            </div>
          </div>
        </div>
      )}

      {tab==="leads" && (
        <>
          {showForm||editing ? (
            <LeadForm onSave={saveLead} onCancel={()=>{setShowForm(false);setEditing(null);}} initial={editing}/>
          ) : (
            <>
              <div style={{ ...S.flexB, marginBottom:12, flexWrap:"wrap", gap:8 }}>
                <button style={{ ...S.btn, ...S.btnP }} onClick={()=>setShowForm(true)}>+ Nuovo Lead</button>
                <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                  <input style={{ ...S.input, width:160 }} placeholder="🔍 Cerca..." value={search} onChange={e=>setSearch(e.target.value)}/>
                  <select style={{ ...S.select, width:180 }} value={filter} onChange={e=>setFilter(e.target.value)}>
                    <option value="tutti">Tutti gli stati</option>
                    {STATI.map(s=><option key={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div style={{ color:"#475569", fontSize:11, marginBottom:8 }}>{filtered.length} lead</div>
              {filtered.length===0 ? (
                <div style={{ ...S.card, textAlign:"center", padding:36, color:"#475569" }}><div style={{ fontSize:32, marginBottom:8 }}>📋</div>Nessun lead. Inizia ad aggiungerne!</div>
              ) : filtered.map(lead=>(
                <div key={lead.id} style={{ ...S.card, marginBottom:8, borderLeftWidth:3, borderLeftColor:STATO_COLORS[lead.stato]?.dot||"#1e2d45" }}>
                  <div style={{ ...S.flexB, flexWrap:"wrap", gap:6 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:700, color:"#fff", fontSize:14 }}>{lead.nome||"—"}</div>
                      <div style={{ color:"#64748b", fontSize:12, marginTop:2 }}>📞 {lead.telefono||"—"} · 📍 {lead.zona||"—"} · 🏷️ {lead.nicchia}</div>
                      {lead.dataAppuntamento && <div style={{ color:"#22c55e", fontSize:12, marginTop:2 }}>📅 App: {formatDate(lead.dataAppuntamento)} {lead.oraAppuntamento && "alle "+lead.oraAppuntamento}</div>}
                      {lead.stato==="Vendita chiusa" && lead.prezzoSetup && (
                        <div style={{ marginTop:6, background:"#052e16", borderRadius:7, padding:"7px 10px", border:"1px solid #166534" }}>
                          <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                            <div>
                              <div style={{ fontSize:9, color:"#64748b", textTransform:"uppercase", letterSpacing:"0.06em" }}>Setup</div>
                              <div style={{ color:"#4ade80", fontSize:13, fontWeight:700 }}>{eur(parseFloat(lead.prezzoSetup)||0)}</div>
                              <div style={{ color:"#64748b", fontSize:9 }}>subito</div>
                            </div>
                            <div>
                              <div style={{ fontSize:9, color:"#64748b", textTransform:"uppercase", letterSpacing:"0.06em" }}>Mensile</div>
                              <div style={{ color:"#93c5fd", fontSize:13, fontWeight:700 }}>{eur(parseFloat(lead.prezzoMensile)||0)}<span style={{fontSize:10, color:"#64748b"}}>/mese</span></div>
                              <div style={{ color:"#64748b", fontSize:9 }}>x {lead.mesiContratto} mesi</div>
                            </div>
                            <div>
                              <div style={{ fontSize:9, color:"#64748b", textTransform:"uppercase", letterSpacing:"0.06em" }}>Totale</div>
                              <div style={{ color:"#fcd34d", fontSize:13, fontWeight:700 }}>{eur((parseFloat(lead.prezzoSetup)||0)+(parseFloat(lead.prezzoMensile)||0)*(parseInt(lead.mesiContratto)||0))}</div>
                              <div style={{ color:"#64748b", fontSize:9 }}>contratto</div>
                            </div>
                          </div>
                        </div>
                      )}
                      )}
                    </div>
                    <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
                      <Badge stato={lead.stato}/>
                      <button style={{ ...S.btn, ...S.btnG, padding:"4px 9px", fontSize:12 }} onClick={()=>setEditing(lead)}>✏️</button>
                      <button style={{ ...S.btn, ...S.btnD, padding:"4px 9px", fontSize:12 }} onClick={()=>setConfirmDelete(lead.id)}>🗑️</button>
                    </div>
                  </div>
                  {lead.note && <div style={{ marginTop:7, color:"#64748b", fontSize:12, background:"#0a1120", padding:"6px 10px", borderRadius:7 }}>{lead.note}</div>}
                </div>
              ))}
            </>
          )}
        </>
      )}

      {/* ── AGENDA ── */}
      {tab==="agenda" && (
        <>
          <div style={{ ...S.h2, marginBottom:14 }}>📅 Appuntamenti in programma</div>
          {appuntamenti.length===0 ? (
            <div style={{ ...S.card, textAlign:"center", padding:36, color:"#475569" }}><div style={{ fontSize:32, marginBottom:8 }}>📅</div>Nessun appuntamento fissato.<br/><span style={{ fontSize:12 }}>Aggiungi data/ora quando fissi un appuntamento.</span></div>
          ) : appuntamenti.map(lead=>{
            const days = daysUntil(lead.dataAppuntamento);
            const urgColor = days===0?"#f97316":days<0?"#ef4444":"#22c55e";
            return (
              <div key={lead.id} style={{ ...S.card, borderLeftWidth:3, borderLeftColor:urgColor }}>
                <div style={{ ...S.flexB, flexWrap:"wrap", gap:6 }}>
                  <div>
                    <div style={{ fontWeight:700, color:"#fff", fontSize:14 }}>{lead.nome}</div>
                    <div style={{ color:"#64748b", fontSize:12, marginTop:2 }}>📞 {lead.telefono||"—"} · 🏷️ {lead.nicchia}</div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontWeight:800, color:urgColor, fontSize:15 }}>{formatDate(lead.dataAppuntamento)}{lead.oraAppuntamento && " — "+lead.oraAppuntamento}</div>
                    <div style={{ fontSize:11, color:urgColor }}>{days<0?"Scaduto":days===0?"Oggi":days===1?"Domani":days+" giorni"}</div>
                  </div>
                </div>
                {lead.note && <div style={{ marginTop:6, color:"#64748b", fontSize:12, background:"#0a1120", padding:"5px 9px", borderRadius:6 }}>{lead.note}</div>}
                <div style={{ marginTop:8, display:"flex", gap:6 }}>
                  <button style={{ ...S.btn, background:"#14532d", color:"#4ade80", border:"1px solid #166534", fontSize:11, padding:"5px 10px" }} onClick={()=>{ updateLead({...lead, stato:"Anteprima mostrata"}); }}>✓ Anteprima mostrata</button>
                  <button style={{ ...S.btn, ...S.btnG, fontSize:11, padding:"5px 10px" }} onClick={()=>setEditing(lead)}>✏️ Modifica</button>
                </div>
              </div>
            );
          })}
        </>
      )}

      {/* ── KPI ── */}
      {tab==="kpi" && (
        <>
          <div style={{ ...S.grid2, marginBottom:10 }}>
            <KPICard icon="📞" label="Chiamate" value={kpi.chiamate} accent="#3b82f6"/>
            <KPICard icon="📅" label="Appuntamenti" value={kpi.appuntamenti} accent="#22c55e"/>
            <KPICard icon="👁️" label="Anteprime" value={kpi.anteprime} accent="#8b5cf6"/>
            <KPICard icon="💰" label="Vendite" value={kpi.vendite} accent="#f59e0b"/>
          </div>

          {/* Box fatturato */}
          <div style={S.cardGreen}>
            <div style={{ ...S.h3, color:"#4ade80" }}>IL TUO FATTURATO</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <div>
                  <div style={{ fontSize:11, color:"#64748b" }}>Totale generato</div>
                  <div style={{ fontSize:22, fontWeight:900, color:"#4ade80" }}>{eur(kpi.fatturato)}</div>
                </div>
                <div>
                  <div style={{ fontSize:11, color:"#64748b" }}>Comm. totale setup</div>
                  <div style={{ fontSize:22, fontWeight:900, color:"#4ade80" }}>{eur(kpi.fatturatoSetup)}</div>
                </div>
                <div style={{ background:"#0a2a1a", borderRadius:8, padding:"9px 10px", border:"1px solid #166534" }}>
                  <div style={{ fontSize:10, color:"#64748b", marginBottom:3 }}>Comm. setup (incassata)</div>
                  <div style={{ fontSize:22, fontWeight:900, color:"#f59e0b" }}>{eur(kpi.commSetup)}</div>
                </div>
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <div>
                  <div style={{ fontSize:11, color:"#64748b" }}>Ricorrente mensile attivo</div>
                  <div style={{ fontSize:22, fontWeight:900, color:"#93c5fd" }}>{eur(kpi.ricorrenteMensile)}<span style={{fontSize:12, color:"#64748b"}}>/mese</span></div>
                </div>
                <div style={{ background:"#1c1205", borderRadius:8, padding:"9px 10px", border:"1px solid #92400e", flex:1 }}>
                  <div style={{ fontSize:10, color:"#92400e", marginBottom:3 }}>Comm. mensile ricorrente</div>
                  <div style={{ fontSize:22, fontWeight:900, color:"#fcd34d" }}>{eur(kpi.commMensile)}<span style={{fontSize:11, color:"#92400e"}}>/mese</span></div>
                  <div style={{ fontSize:9, color:"#92400e", marginTop:2 }}>ogni mese finche attivo</div>
                </div>
              </div>
            </div>
          </div>
          <div style={{ ...S.grid2, marginBottom:10 }}>
            <KPICard icon="🎯" label="App / Chiamate" value={kpi.tasso_app!=="—"?kpi.tasso_app+"%":"—"} accent="#3b82f6"/>
            <KPICard icon="📈" label="Chiusura / Anteprime" value={kpi.tasso_chiusura!=="—"?kpi.tasso_chiusura+"%":"—"} accent="#22c55e"/>
          </div>

          <div style={S.card}>
            <div style={S.h3}>Lead per stato</div>
            {STATI.map(s=>{
              const n=mine.filter(l=>l.stato===s).length;
              const pct=mine.length>0?(n/mine.length*100):0;
              const c=STATO_COLORS[s];
              return (
                <div key={s} style={{ marginBottom:9 }}>
                  <div style={{ ...S.flexB, marginBottom:2 }}>
                    <span style={{ fontSize:12, color:"#94a3b8" }}>{s}</span>
                    <span style={{ fontSize:12, fontWeight:700, color:c?.dot||"#fff" }}>{n}</span>
                  </div>
                  <div style={{ background:"#0a1120", borderRadius:4, height:5 }}>
                    <div style={{ width:`${pct}%`, background:c?.dot||"#3b82f6", height:5, borderRadius:4, transition:"width 0.5s" }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}

      {/* ── SCRIPT ── */}
      {tab==="script" && (
        <>
          <div style={{ color:"#64748b", fontSize:12, marginBottom:12 }}>Tocca una sezione per espanderla durante la chiamata.</div>
          {SCRIPT_SECTIONS.map(sec=>(
            <div key={sec.id} style={{ ...S.card, cursor:"pointer", borderLeftWidth:3, borderLeftColor:sec.color }} onClick={()=>setOpenScript(openScript===sec.id?null:sec.id)}>
              <div style={S.flexB}>
                <div style={{ fontWeight:700, color:"#fff", fontSize:14 }}>{sec.title}</div>
                <span style={{ color:"#475569" }}>{openScript===sec.id?"▲":"▼"}</span>
              </div>
              {openScript===sec.id && (
                <div style={{ marginTop:12 }}>
                  {sec.steps.map((step,i)=>(
                    <div key={i} style={{ marginBottom:9, background:"#0a1120", borderRadius:8, padding:11, border:`1px solid ${sec.color}22` }}>
                      <div style={{ fontSize:10, fontWeight:700, color:sec.color, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:5 }}>{step.label}</div>
                      <div style={{ color:"#e2e8f0", fontSize:13, lineHeight:1.6 }}>{step.text}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </>
      )}
    </div>
  );
}

// ─── MANAGER VIEW ────────────────────────────────────
function ManagerView({ users, leads }) {
  const [tab, setTab] = useState("overview");
  const sellers = users.filter(u=>u.role==="seller");
  const sellerStats = sellers.map(s=>({ ...s, kpi:computeKPI(leads.filter(l=>l.userId===s.id)) })).sort((a,b)=>b.kpi.fatturato-a.kpi.fatturato);
  const totalKPI = computeKPI(leads);

  // Setup incassato questo mese (una tantum) + primo mese ricorrente
  const thisMonth = new Date().getMonth();
  const thisYear = new Date().getFullYear();
  const venditeMese = leads.filter(l=>{
    if (l.stato!=="Vendita chiusa"||!l.createdAt) return false;
    const d = new Date(l.createdAt);
    return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  });
  // Incassato subito questo mese = setup + primo mese di ogni contratto chiuso questo mese
  const setupMese = venditeMese.reduce((acc,l)=>acc+(parseFloat(l.prezzoSetup)||0),0);
  const primoMensile = venditeMese.reduce((acc,l)=>acc+(parseFloat(l.prezzoMensile)||0),0);
  const incassatoMese = setupMese + primoMensile;
  // Ricorrente mensile totale da tutti i contratti attivi
  const ricorrenteTeam = leads.filter(l=>l.stato==="Vendita chiusa").reduce((acc,l)=>acc+(parseFloat(l.prezzoMensile)||0),0);
  // Setup totale team
  const setupTotaleTeam = leads.filter(l=>l.stato==="Vendita chiusa").reduce((acc,l)=>acc+(parseFloat(l.prezzoSetup)||0),0);
  const nicchiaStats = NICCHIE.map(n=>({
    name:n,
    totale:leads.filter(l=>l.nicchia===n).length,
    vendite:leads.filter(l=>l.nicchia===n&&l.stato==="Vendita chiusa").length,
    fatturato:leads.filter(l=>l.nicchia===n&&l.stato==="Vendita chiusa").reduce((acc,l)=>acc+(parseFloat(l.prezzoSetup)||0)+(parseFloat(l.prezzoMensile)||0)*(parseInt(l.mesiContratto)||0),0),
  })).filter(n=>n.totale>0).sort((a,b)=>b.fatturato-a.fatturato);

  // Tutti gli appuntamenti del team
  const allApp = leads.filter(l=>(l.stato==="Appuntamento fissato"||l.stato==="Anteprima mostrata")&&l.dataAppuntamento)
    .sort((a,b)=>new Date(a.dataAppuntamento)-new Date(b.dataAppuntamento));

  return (
    <div style={S.page}>
      <div style={{ ...S.flexB, marginBottom:18, flexWrap:"wrap", gap:8 }}>
        <div>
          <div style={S.h1}>Dashboard Manager 👑</div>
          <div style={{ color:"#475569", fontSize:12 }}>Visione completa del team</div>
        </div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
          {["overview","fatturato","agenda","classifica","allleads"].map(t=>(
            <TabBtn key={t} label={t==="overview"?"📊 Overview":t==="fatturato"?"💶 Fatturato":t==="agenda"?"📅 Agenda":t==="classifica"?"🏆 Classifica":"📋 Lead"} active={tab===t} onClick={()=>setTab(t)}/>
          ))}
        </div>
      </div>

      {/* ── OVERVIEW ── */}
      {tab==="overview" && (
        <>
          <div style={{ ...S.grid2, marginBottom:10 }}>
            <KPICard icon="📞" label="Chiamate totali" value={totalKPI.chiamate} accent="#3b82f6"/>
            <KPICard icon="📅" label="Appuntamenti" value={totalKPI.appuntamenti} accent="#22c55e"/>
            <KPICard icon="👁️" label="Anteprime" value={totalKPI.anteprime} accent="#8b5cf6"/>
            <KPICard icon="💰" label="Vendite chiuse" value={totalKPI.vendite} accent="#f59e0b"/>
          </div>
          <div style={S.cardGold}>
            <div style={{ ...S.h3, color:"#fdba74" }}>FATTURATO TEAM</div>
            <div style={S.grid2}>
              <div>
                <div style={{ fontSize:11, color:"#92400e" }}>Setup incassato (tot.)</div>
                <div style={{ fontSize:20, fontWeight:900, color:"#f59e0b" }}>{eur(setupTotaleTeam)}</div>
                <div style={{ fontSize:10, color:"#92400e", marginTop:2 }}>pagato subito alla firma</div>
              </div>
              <div>
                <div style={{ fontSize:11, color:"#92400e" }}>Incassato questo mese</div>
                <div style={{ fontSize:20, fontWeight:900, color:"#fdba74" }}>{eur(incassatoMese)}</div>
                <div style={{ fontSize:10, color:"#92400e", marginTop:2 }}>setup + 1° mese nuovi contratti</div>
              </div>
              <div>
                <div style={{ fontSize:11, color:"#92400e" }}>Ricorrente mensile attivo</div>
                <div style={{ fontSize:20, fontWeight:900, color:"#fcd34d" }}>{eur(ricorrenteTeam)}/mese</div>
                <div style={{ fontSize:10, color:"#92400e", marginTop:2 }}>entra ogni mese dai contratti attivi</div>
              </div>
              <div>
                <div style={{ fontSize:11, color:"#92400e" }}>Commissioni totali dovute</div>
                <div style={{ fontSize:20, fontWeight:900, color:"#fca5a5" }}>{eur(totalKPI.commissioni)}</div>
                <div style={{ fontSize:10, color:"#92400e", marginTop:2 }}>10% setup + 10% mensile</div>
              </div>
            </div>
          </div>
          {/* Venditori - full width stacked */}
          <div style={S.card}>
            <div style={S.h3}>VENDITORI</div>
            {sellerStats.map((s,i)=>(
              <div key={s.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid #0f1e33", gap:8 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <div style={{ width:26, height:26, borderRadius:"50%", background:["#f59e0b","#94a3b8","#cd7f32","#64748b"][i]||"#1e2d45", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff", flexShrink:0 }}>{i+1}</div>
                  <div>
                    <div style={{ fontWeight:700, color:"#fff", fontSize:13 }}>{s.name}</div>
                    <div style={{ color:"#475569", fontSize:11 }}>{s.kpi.vendite} vendite · setup {eur(s.kpi.fatturatoSetup)} · {eur(s.kpi.ricorrenteMensile)}/mese</div>
                  </div>
                </div>
                <div style={{ textAlign:"right", flexShrink:0 }}>
                  <div style={{ fontWeight:800, color:"#f59e0b", fontSize:13 }}>{eur(s.kpi.commSetup+s.kpi.commMensile)}</div>
                  <div style={{ color:"#475569", fontSize:10 }}>comm. dovute</div>
                </div>
              </div>
            ))}
          </div>

          {/* Per nicchia - full width */}
          {nicchiaStats.length>0 && (
            <div style={S.card}>
              <div style={S.h3}>PER NICCHIA</div>
              {nicchiaStats.map(n=>(
                <div key={n.name} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"8px 0", borderBottom:"1px solid #0f1e33", gap:8 }}>
                  <div>
                    <div style={{ color:"#94a3b8", fontSize:12, fontWeight:600 }}>{n.name}</div>
                    <div style={{ color:"#64748b", fontSize:10, marginTop:2 }}>{n.totale} lead · {n.vendite} vendite</div>
                  </div>
                  <div style={{ color:"#4ade80", fontWeight:700, fontSize:13, flexShrink:0 }}>{eur(n.fatturato)}</div>
                </div>
              ))}

          )}

            <div style={{ ...S.h3, color:"#fdba74" }}>RIEPILOGO FATTURATO TEAM</div>

              <div>
                <div style={{ fontSize:11, color:"#92400e" }}>Setup totale incassato</div>

                    <div>
                      <div style={{ fontWeight:800, color:"#fff", fontSize:14 }}>{s.name}</div>

                </div>
                <div style={{ ...S.grid2, marginBottom:10 }}>
                  <div style={{ background:"#0a1120", borderRadius:8, padding:"10px 12px" }}>
                    <div style={{ fontSize:10, color:"#64748b" }}>Setup incassato</div>
                    <div style={{ fontSize:16, fontWeight:900, color:"#4ade80" }}>{eur(setupV)}</div>
                    <div style={{ fontSize:9, color:"#475569", marginTop:2 }}>pagato subito</div>
                  </div>
                  <div style={{ background:"#0c1a3a", borderRadius:8, padding:"10px 12px" }}>
                    <div style={{ fontSize:10, color:"#64748b" }}>Ricorrente mensile</div>
                    <div style={{ fontSize:16, fontWeight:900, color:"#93c5fd" }}>{eur(ricV)}/mese</div>
                    <div style={{ fontSize:9, color:"#475569", marginTop:2 }}>ogni mese attivo</div>
                  </div>
                  <div style={{ background:"#052e16", borderRadius:8, padding:"10px 12px" }}>
                    <div style={{ fontSize:10, color:"#166534" }}>Comm. setup (10%)</div>
                    <div style={{ fontSize:16, fontWeight:900, color:"#4ade80" }}>{eur(setupV*0.1)}</div>

                  <div style={{ background:"#1c1205", borderRadius:8, padding:"10px 12px", border:"1px solid #92400e" }}>
                    <div style={{ fontSize:10, color:"#92400e" }}>Comm. mensile (10%)</div>
                    <div style={{ fontSize:16, fontWeight:900, color:"#f59e0b" }}>{eur(ricV*0.1)}/mese</div>
                    <div style={{ fontSize:9, color:"#92400e", marginTop:2 }}>ricorrente</div>
                  </div>
                </div>
                {contratti.length>0 && (
                  <div>
                    <div style={{ fontSize:10, color:"#64748b", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.06em" }}>Contratti attivi</div>
                    {contratti.map(l=>{
                      const setup=parseFloat(l.prezzoSetup)||0;
                      const mensile=parseFloat(l.prezzoMensile)||0;
                      const mesi=parseInt(l.mesiContratto)||0;
                      return (
                        <div key={l.id} style={{ background:"#0a1120", borderRadius:6, padding:"8px 10px", marginBottom:5 }}>
                          <div style={{ ...S.flexB, marginBottom:3 }}>
                            <span style={{ color:"#e2e8f0", fontSize:12, fontWeight:600 }}>{l.nome||"—"}</span>
                            <span style={{ color:"#4ade80", fontSize:11, fontWeight:700 }}>{eur(setup+(mensile*mesi))} tot.</span>
                          </div>
                          <div style={{ color:"#64748b", fontSize:11 }}>
                            Setup: {eur(setup)} pagato subito · {eur(mensile)}/mese × {mesi} mesi
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </>
      )}


      {/* ── AGENDA MANAGER ── */}
      {tab==="agenda" && (
        <>
          <div style={{ ...S.h2, marginBottom:14 }}>📅 Tutti gli appuntamenti del team</div>
          {allApp.length===0 ? (
            <div style={{ ...S.card, textAlign:"center", padding:36, color:"#475569" }}><div style={{ fontSize:32, marginBottom:8 }}>📅</div>Nessun appuntamento fissato nel team.</div>
          ) : allApp.map(lead=>{
            const seller=users.find(u=>u.id===lead.userId);
            const days=daysUntil(lead.dataAppuntamento);
            const urgColor=days===0?"#f97316":days<0?"#ef4444":"#22c55e";
            return (
              <div key={lead.id} style={{ ...S.card, borderLeftWidth:3, borderLeftColor:urgColor }}>
                <div style={{ ...S.flexB, flexWrap:"wrap", gap:6 }}>
                  <div>
                    <div style={{ fontWeight:700, color:"#fff", fontSize:14 }}>{lead.nome}</div>
                    <div style={{ color:"#64748b", fontSize:12, marginTop:2 }}>
                      📞 {lead.telefono||"—"} · 👤 <span style={{ color:"#93c5fd" }}>{seller?.name||"—"}</span> · 🏷️ {lead.nicchia}
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontWeight:800, color:urgColor, fontSize:14 }}>{formatDate(lead.dataAppuntamento)}{lead.oraAppuntamento&&" — "+lead.oraAppuntamento}</div>
                    <div style={{ fontSize:11, color:urgColor }}>{days<0?"Scaduto":days===0?"Oggi":days===1?"Domani":days+" giorni"}</div>
                  </div>
                </div>
                <Badge stato={lead.stato}/>
              </div>
            );
          })}
        </>
      )}

      {/* ── CLASSIFICA ── */}
      {tab==="classifica" && (
        <div style={S.card}>
          <div style={{ ...S.h2, marginBottom:18 }}>🏆 Classifica Venditori</div>
          {sellerStats.map((s,i)=>{
            const medals=["🥇","🥈","🥉","4️⃣"];
            const pct=sellerStats[0]?.kpi.vendite>0?(s.kpi.vendite/sellerStats[0].kpi.vendite*100):0;
            return (
              <div key={s.id} style={{ ...S.card, marginBottom:10, border:i===0?"1px solid #d97706":"1px solid #1e2d45", background:i===0?"#1c1205":"#0d1520" }}>
                <div style={{ ...S.flexB, marginBottom:8 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{ fontSize:24 }}>{medals[i]||"👤"}</span>
                    <div>
                      <div style={{ fontWeight:800, color:"#fff", fontSize:14 }}>{s.name}</div>
                      <div style={{ color:"#475569", fontSize:11 }}>{s.kpi.chiamate} chiam. · {s.kpi.appuntamenti} app. · {s.kpi.anteprime} ant.</div>
                    </div>
                  </div>
                  <div style={{ textAlign:"right" }}>
                    <div style={{ fontSize:26, fontWeight:900, color:i===0?"#f59e0b":"#4ade80" }}>{s.kpi.vendite}</div>
                    <div style={{ color:"#475569", fontSize:10 }}>vendite</div>
                  </div>
                </div>
                <div style={{ background:"#0a1120", borderRadius:5, height:6 }}>
                  <div style={{ width:`${pct}%`, background:i===0?"#f59e0b":"#22c55e", height:6, borderRadius:5, transition:"width 0.6s" }}/>
                </div>
                <div style={{ display:"flex", gap:12, marginTop:7 }}>
                  <span style={{ fontSize:11, color:"#64748b" }}>App/Chiamate: <b style={{ color:"#93c5fd" }}>{s.kpi.tasso_app}{s.kpi.tasso_app!=="—"?"%":""}</b></span>
                  <span style={{ fontSize:11, color:"#64748b" }}>Fatturato: <b style={{ color:"#4ade80" }}>{eur(s.kpi.fatturato)}</b></span>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── TUTTI I LEAD ── */}
      {tab==="allleads" && (
        <div>
          <div style={{ ...S.h2, marginBottom:12 }}>Tutti i Lead — {leads.length} totali</div>
          {leads.length===0 ? (
            <div style={{ ...S.card, textAlign:"center", padding:36, color:"#475569" }}><div style={{ fontSize:32, marginBottom:8 }}>📋</div>Nessun lead ancora.</div>
          ) : [...leads].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(lead=>{
            const seller=users.find(u=>u.id===lead.userId);
            return (
              <div key={lead.id} style={{ ...S.card, marginBottom:7, borderLeftWidth:3, borderLeftColor:STATO_COLORS[lead.stato]?.dot||"#1e2d45" }}>
                <div style={{ ...S.flexB, flexWrap:"wrap", gap:5 }}>
                  <div>
                    <div style={{ fontWeight:700, color:"#fff", fontSize:13 }}>{lead.nome||"—"}</div>
                    <div style={{ color:"#64748b", fontSize:11, marginTop:2 }}>📞 {lead.telefono||"—"} · 🏷️ {lead.nicchia} · 👤 <span style={{ color:"#93c5fd" }}>{seller?.name||"—"}</span></div>
                    {lead.stato==="Vendita chiusa"&&lead.prezzoSetup&&(
                      <div style={{ marginTop:5, background:"#052e16", borderRadius:6, padding:"6px 9px", border:"1px solid #166534" }}>
                        <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                          <div><div style={{ fontSize:9, color:"#64748b" }}>Setup</div><div style={{ color:"#4ade80", fontSize:12, fontWeight:700 }}>{eur(parseFloat(lead.prezzoSetup)||0)}</div></div>
                          <div><div style={{ fontSize:9, color:"#64748b" }}>Mensile</div><div style={{ color:"#93c5fd", fontSize:12, fontWeight:700 }}>{eur(parseFloat(lead.prezzoMensile)||0)}<span style={{fontSize:9, color:"#64748b"}}>/mese x{lead.mesiContratto}</span></div></div>
                          <div><div style={{ fontSize:9, color:"#64748b" }}>Totale contratto</div><div style={{ color:"#fcd34d", fontSize:12, fontWeight:700 }}>{eur((parseFloat(lead.prezzoSetup)||0)+(parseFloat(lead.prezzoMensile)||0)*(parseInt(lead.mesiContratto)||0))}</div></div>
                        </div>
                      </div>
                    )}
                  </div>
                  <Badge stato={lead.stato}/>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── CONFIG SUPABASE ─────────────────────────────────
// Incolla qui i tuoi dati Supabase
const SUPABASE_URL = "INCOLLA_QUI_URL";       // es: https://xxxx.supabase.co
const SUPABASE_KEY = "INCOLLA_QUI_ANON_KEY";  // la anon/public key

const db = {
  get h() {
    return {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Prefer": "return=minimal"
    };
  },
  async getAll() {
    const res = await fetch(SUPABASE_URL + "/rest/v1/leads?select=*", {
      headers: { ...this.h, "Prefer": "" }
    });
    return await res.json();
  },
  async add(lead) {
    await fetch(SUPABASE_URL + "/rest/v1/leads", {
      method: "POST", headers: this.h, body: JSON.stringify(lead)
    });
  },
  async update(lead) {
    await fetch(SUPABASE_URL + "/rest/v1/leads?id=eq." + lead.id, {
      method: "PATCH", headers: this.h, body: JSON.stringify(lead)
    });
  },
  async remove(id) {
    await fetch(SUPABASE_URL + "/rest/v1/leads?id=eq." + id, {
      method: "DELETE", headers: this.h
    });
  }
};

const useSheets = SUPABASE_URL !== "INCOLLA_QUI_URL";

// ─── ROOT ────────────────────────────────────────────
function App() {
  const [leads, setLeads]       = useState([]);
  const [loading, setLoading]   = useState(false);
  const [syncing, setSyncing]   = useState(false);
  const [users]                 = useState(INITIAL_USERS);
  const [currentUser, setCurrentUser] = useState(null);

  // Carica leads da Google Sheets al login
  useEffect(() => {
    if (!currentUser || !useSheets) return;
    setLoading(true);
    db.getAll()
      .then(data => setLeads(data))
      .catch(() => {})
      .finally(() => setLoading(false));
  }, [currentUser]);

  // Wrapper che salva su Sheets + aggiorna stato locale
  const addLead = async (lead) => {
    setLeads(ls => [...ls, lead]);
    if (!useSheets) return;
    setSyncing(true);
    try { await db.add(lead); } catch(e) {}
    setSyncing(false);
  };

  const updateLead = async (lead) => {
    setLeads(ls => ls.map(l => l.id === lead.id ? lead : l));
    if (!useSheets) return;
    setSyncing(true);
    try { await db.update(lead); } catch(e) {}
    setSyncing(false);
  };

  const deleteLead = async (id) => {
    setLeads(ls => ls.filter(l => l.id !== id));
    if (!useSheets) return;
    setSyncing(true);
    try { await db.remove(id); } catch(e) {}
    setSyncing(false);
  };

  if (!currentUser) return <Login users={users} onLogin={setCurrentUser}/>;

  if (loading) return (
    <div style={{ ...S.app, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <div style={{ fontSize:36 }}>⚡</div>
      <div style={{ color:"#fff", fontWeight:700 }}>Caricamento dati...</div>
      <div style={{ color:"#475569", fontSize:13 }}>Connessione a Supabase</div>
    </div>
  );

  return (
    <div style={S.app}>
      <nav style={S.nav}>
        <div style={{ fontWeight:800, fontSize:16, color:"#fff", letterSpacing:"-0.5px" }}>Sales<span style={{ color:"#3b82f6" }}>World</span> <span style={{ color:"#1e3a5f", fontSize:12 }}>CRM</span></div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {syncing && <span style={{ fontSize:11, color:"#f59e0b" }}>💾 Salvataggio...</span>}
          {useSheets && !syncing && <span style={{ fontSize:11, color:"#22c55e" }}>☁️ Connesso</span>}
          <span style={{ color:"#64748b", fontSize:12 }}>{currentUser.name}{currentUser.role==="manager"?" 👑":""}</span>
          <button style={{ ...S.btn, ...S.btnG, fontSize:11, padding:"5px 11px" }} onClick={()=>setCurrentUser(null)}>Esci</button>
        </div>
      </nav>
      {currentUser.role==="manager"
        ? <ManagerView users={users} leads={leads}/>
        : <SellerView user={currentUser} leads={leads} addLead={addLead} updateLead={updateLead} deleteLead={deleteLead}/>
      }
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
