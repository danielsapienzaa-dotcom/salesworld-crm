const computeKPI = (leads) => {
  const chiamate = leads.filter(l => l.stato !== "Da chiamare").length;
  const appuntamenti = leads.filter(l => ["Appuntamento fissato","Anteprima mostrata","Vendita chiusa"].includes(l.stato)).length;
  const anteprime = leads.filter(l => ["Anteprima mostrata","Vendita chiusa"].includes(l.stato)).length;
  const vendite = leads.filter(l => l.stato === "Vendita chiusa").length;
  const tasso_app = chiamate > 0 ? (appuntamenti/chiamate*100).toFixed(1) : "—";
  const tasso_chiusura = anteprime > 0 ? (vendite/anteprime*100).toFixed(1) : "—";
  // Fatturato: setup + (mensile * mesi)
  const fatturato = leads.filter(l => l.stato === "Vendita chiusa").reduce((acc, l) => {
    const setup = parseFloat(l.prezzoSetup)||0;
    const mensile = parseFloat(l.prezzoMensile)||0;
    const mesi = parseInt(l.mesiContratto)||0;
    return acc + setup + (mensile * mesi);
  }, 0);
  const chiuse2 = leads.filter(l => l.stato === "Vendita chiusa");
  const fatturatoSetup = chiuse2.reduce((acc,l) => acc+(parseFloat(l.prezzoSetup)||0), 0);
  const ricorrenteMensile = chiuse2.reduce((acc,l) => acc+(parseFloat(l.prezzoMensile)||0), 0);
  const commSetup = fatturatoSetup * COMM_PCT;
  const commMensile = ricorrenteMensile * COMM_PCT;
  const commissioni = commSetup + commMensile;
  return { chiamate, appuntamenti, anteprime, vendite, tasso_app, tasso_chiusura, fatturato, fatturatoSetup, ricorrenteMensile, commSetup, commMensile, commissioni };
};

function Login({ users, onLogin }) {
  const [sel, setSel] = useState(users[0].id);
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const handle = () => {
    const u = users.find(x => x.id===sel);
    if (u && u.password===pw) onLogin(u);
    else { setErr("Password errata"); setTimeout(()=>setErr(""),2000); }
  };
  return (
    <div style={{ minHeight:"100vh", background:"#080c14", display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ width:"100%", maxWidth:340 }}>
        <div style={{ textAlign:"center", marginBottom:32 }}>

          <div style={{ color:"#475569", fontSize:13, marginTop:4 }}>CRM & Script — Pavia</div>
        </div>
        <div style={{ ...S.card, padding:24 }}>
          <div style={{ marginBottom:14 }}>
            <label style={S.label}>Profilo</label>
            <select style={S.select} value={sel} onChange={e=>setSel(e.target.value)}>
              {users.map(u=><option key={u.id} value={u.id}>{u.name}{u.role==="manager"?" 👑":""}</option>)}
            </select>
          </div>
          <div style={{ marginBottom:18 }}>
            <label style={S.label}>Password</label>
            <input style={S.input} type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} placeholder="••••••••"/>
          </div>
          {err && <div style={{ color:"#fca5a5", fontSize:13, marginBottom:10, textAlign:"center" }}>{err}</div>}
          <button style={{ ...S.btn, ...S.btnP, width:"100%", padding:"11px 0", fontSize:14 }} onClick={handle}>Accedi →</button>

      </div>
    </div>
  );
}

function ManagerView({ users, leads }) {
  const [tab, setTab] = useState("overview");
  const [editingLead, setEditingLead] = useState(null);
  const [confirmDeleteMgr, setConfirmDeleteMgr] = useState(null);
  const [contratti, setContratti] = useState([]);
  const [loadingC, setLoadingC] = useState(false);
  const [filtroC, setFiltroC] = useState("tutti");
  const [editNotaC, setEditNotaC] = useState(null);
  const [confirmDeleteC, setConfirmDeleteC] = useState(null);

  const eliminaContratto = async (id) => {
    setContratti(prev=>prev.filter(c=>c.id!==id));
    setConfirmDeleteC(null);
    try {
      await fetch(SUPABASE_URL+"/rest/v1/contratti?id=eq."+id, {
        method:"DELETE", headers:db.h
      });
    } catch(e){}
  };

  const caricaContratti = async (silent=false) => {
    if(!silent) setLoadingC(true);
    try {
      const r = await fetch(SUPABASE_URL+"/rest/v1/contratti?select=*&order=created_at.desc",{headers:db.h});
      if(r.ok){
        const data = await r.json();
        setContratti(data);
      }
    } catch(e){}
    if(!silent) setLoadingC(false);
  };

  // Carica contratti all'avvio del manager (per notifiche) + polling quando tab attivo
  useEffect(()=>{ caricaContratti(true); },[]);
  useEffect(()=>{
    if(tab==="contratti"){
      caricaContratti();
      const interval = setInterval(()=>caricaContratti(true), 20000);
      return ()=>clearInterval(interval);
    }
  },[tab]);

  // Refresh immediato quando un venditore salva un contratto (stessa sessione)
  useEffect(()=>{
    const handler = ()=>{ caricaContratti(true); };
    window.addEventListener("contrattoSalvato", handler);
    return ()=>window.removeEventListener("contrattoSalvato", handler);
  },[tab]);


  const aggiornaAzioneC = async (id, azione) => {
    if(!id) return;
    setContratti(prev=>prev.map(c=>c.id===id?{...c,azione}:c));
    try {
      await fetch(SUPABASE_URL+"/rest/v1/contratti?id=eq."+id, {
        method:"PATCH", headers:{...db.h,"Prefer":"return=minimal"},
        body:JSON.stringify({azione})
      });
    } catch(e){}
  };

  const salvaNotaC = async (id, nota) => {
    if(!id) return;
    setContratti(prev=>prev.map(c=>c.id===id?{...c,nota_manager:nota}:c));
    setEditNotaC(null);
    try {
      await fetch(SUPABASE_URL+"/rest/v1/contratti?id=eq."+id, {
        method:"PATCH", headers:{...db.h,"Prefer":"return=minimal"},
        body:JSON.stringify({nota_manager:nota})
      });
    } catch(e){}
  };

  const sellers = users.filter(u=>u.role==="seller");
  const sellerStats = sellers.map(s=>({ ...s, kpi:computeKPI(leads.filter(l=>l.userId===s.id)) })).sort((a,b)=>b.kpi.fatturato-a.kpi.fatturato);
  const totalKPI = computeKPI(leads);

  // Setup incassato questo mese (una tantum) + primo mese ricorrente
  const thisMonth = new Date().getMonth();
  const thisYear = new Date().getFullYear();
  const venditeMese = leads.filter(l=>{
    if (l.stato!=="Vendita chiusa"||!l.createdAt) return false;
    const d = new Date(l.createdAt);
    return d.getMonth()===thisMonth && d.getFullYear()===thisYear;
  });
  // Setup incassati questo mese (entrata immediata alla firma)
  const setupMese = venditeMese.reduce((acc,l)=>acc+(parseFloat(l.prezzoSetup)||0),0);
  const incassatoMese = setupMese; // solo setup = quello che entra subito questo mese
  // Ricorrente mensile = quello che le aziende pagano ogni mese
  const ricorrenteTeam = leads.filter(l=>l.stato==="Vendita chiusa").reduce((acc,l)=>acc+(parseFloat(l.prezzoMensile)||0),0);
  // Setup totale incassato da tutti i contratti
  const setupTotaleTeam = leads.filter(l=>l.stato==="Vendita chiusa").reduce((acc,l)=>acc+(parseFloat(l.prezzoSetup)||0),0);
  // Totale complessivo annuo = setup + (mensile × mesi) di tutti i contratti
  const totaleAnnuo = leads.filter(l=>l.stato==="Vendita chiusa").reduce((acc,l)=>{
    const setup=parseFloat(l.prezzoSetup)||0;
    const mensile=parseFloat(l.prezzoMensile)||0;
    const mesi=parseInt(l.mesiContratto)||12;
    return acc+setup+(mensile*mesi);
  },0);
  // Stima fine anno = ricorrente × mesi rimanenti nell'anno
  const mesiRimanenti = 12 - new Date().getMonth();
  const stimaAnno = ricorrenteTeam * mesiRimanenti;
  const nicchiaStats = NICCHIE.map(n=>({
    name:n,
    totale:leads.filter(l=>l.nicchia===n).length,
    vendite:leads.filter(l=>l.nicchia===n&&l.stato==="Vendita chiusa").length,

const SUPABASE_URL = "https://muemzyhhzozycisvijcw.supabase.co";
const SUPABASE_KEY = "sb_publishable_eD-CfbvTlVwcUbVDa7LxIQ_h3BilBXg";

const db = {
  get h() {
    return {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Prefer": "return=minimal"
    };
  },
  async getAll() {
    const res = await fetch(SUPABASE_URL + "/rest/v1/leads?select=*", {
      headers: { ...this.h, "Prefer": "" }
    });
    return await res.json();
  },
  async add(lead) {
    await fetch(SUPABASE_URL + "/rest/v1/leads", {
      method: "POST", headers: this.h, body: JSON.stringify(lead)
    });
  },
  async update(lead) {
    await fetch(SUPABASE_URL + "/rest/v1/leads?id=eq." + lead.id, {
      method: "PATCH", headers: this.h, body: JSON.stringify(lead)
    });
  },
  async remove(id) {
    await fetch(SUPABASE_URL + "/rest/v1/leads?id=eq." + id, {
      method: "DELETE", headers: this.h
    });
  }
};

const useSheets = true; // Supabase attivo

// ─── ROOT ────────────────────────────────────────────
function App() {
  const [leads, setLeads]       = useState([]);
  const [loading, setLoading]   = useState(false);
  const [syncing, setSyncing]   = useState(false);
  const [users]                 = useState(INITIAL_USERS);
  const [currentUser, setCurrentUser] = useState(null);

  // Carica leads da Google Sheets al login
  useEffect(() => {
    if (!currentUser || !useSheets) return;
    setLoading(true);
    db.getAll()
      .then(data => setLeads(data))
      .catch(() => {})
      .finally(() => setLoading(false));
  }, [currentUser]);

  // Wrapper che salva su Sheets + aggiorna stato locale
  const addLead = async (lead) => {
    setLeads(ls => [...ls, lead]);
    if (!useSheets) return;
    setSyncing(true);
    try { await db.add(lead); } catch(e) {}
    setSyncing(false);
  };

  const updateLead = async (lead) => {
    setLeads(ls => ls.map(l => l.id === lead.id ? lead : l));
    if (!useSheets) return;
    setSyncing(true);
    try { await db.update(lead); } catch(e) {}
    setSyncing(false);
  };

  const deleteLead = async (id) => {
    setLeads(ls => ls.filter(l => l.id !== id));
    if (!useSheets) return;
    setSyncing(true);
    try {
      await db.remove(id);
      // Cancella anche il contratto associato su Supabase (se esiste)
      await fetch(SUPABASE_URL+"/rest/v1/contratti?lead_id=eq."+id, {
        method:"DELETE", headers:db.h
      });
    } catch(e) {}
    setSyncing(false);
  };

  if (!currentUser) return <Login users={users} onLogin={setCurrentUser}/>;

  if (loading) return (
    <div style={{ ...S.app, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <div style={{ fontSize:36 }}>⚡</div>
      <div style={{ color:"#fff", fontWeight:700 }}>Caricamento dati...</div>
      <div style={{ color:"#475569", fontSize:13 }}>Connessione a Supabase</div>
    </div>
  );

  return (
    <div style={S.app}>
      <nav style={S.nav}>
        <div style={{ fontWeight:800, fontSize:16, color:"#fff", letterSpacing:"-0.5px" }}>Sales<span style={{ color:"#3b82f6" }}>World</span> <span style={{ color:"#1e3a5f", fontSize:12 }}>CRM</span></div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          {syncing && <span style={{ fontSize:11, color:"#f59e0b" }}>💾 Salvataggio...</span>}
          {useSheets && !syncing && <span style={{ fontSize:11, color:"#22c55e" }}>☁️ Connesso</span>}
          <span style={{ color:"#64748b", fontSize:12 }}>{currentUser.name}{currentUser.role==="manager"?" 👑":""}</span>
          <button style={{ ...S.btn, ...S.btnG, fontSize:11, padding:"5px 11px" }} onClick={()=>setCurrentUser(null)}>Esci</button>
        </div>
      </nav>
      {currentUser.role==="manager"
        ? <ManagerView users={users} leads={leads}/>
        : <SellerView user={currentUser} users={users} leads={leads} addLead={addLead} updateLead={updateLead} deleteLead={deleteLead}/>
      }
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
